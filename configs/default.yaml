dataset:
  name: ailsntua/QEvasion
  config_name: null
  max_length: 256
  val_size: 0.1

model:
  name: microsoft/deberta-v3-base

training:
  seed: 42
  output_dir: outputs
  learning_rate: 1e-5
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  num_train_epochs: 3
  fp16: false
  weight_decay: 0.01
  warmup_ratio: 0.1